            canonical_command: presentations.present
            scoped_by: category
          revoke:
            canonical_command: credential_state.revoke
            scoped_by: category
        request_fields:
          all:
            category:
              enum: [pid, qeaa, pub_eaa, eaa]
          validate:
            - credential
            - verification_context
            - policy
        checks:
          validate:
            common:
              - status
              - expiration
              - claims
              - schema
              - trust_chain
              - holder_binding
              - assurance_level
              - issuer_authorization
            by_category:
              pid:
                - authoritative_source
                - required_attributes
                - namespace
              qeaa:
                - qualified_status
                - qtsp
                - trust_service
                - certificate
                - certificate_chain
                - valid_at_issuance_time
                - valid_at_presentation_time
              pub_eaa:
                - public_body
                - authentic_source
              eaa: []
      pseudonyms:
        commands: [generate, resolve, rotate, revoke, validate]
        checks:
          validate: [scope, relying_party_binding, sector_binding, expiration]
      person_identification_data:
        commands:
          - validate
          - normalize
          - match
          - compare
          - resolve_authoritative_source
          - verify_authoritative_source
        checks:
          validate: [mandatory_attributes, attribute_freshness]
      attributes:
        # EU semantic attribute catalog. Overlaps claims by design: claims is
        # the generic semantic layer; this group adds EU authorization and
        # authentic-source rules.
        commands:
          - register
          - get
          - list
          - update
          - deprecate
          - validate
          - map
          - normalize
          - resolve_authoritative_source
