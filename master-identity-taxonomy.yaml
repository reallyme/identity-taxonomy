  did_me:
    scope: core
    owner: sibling_repo
    mechanism_for: [dids]
    standards: [did_me, w3c_did_core, w3c_did_resolution]
    commands:
      - derive_identifier
      - verify_identifier_binding
      - encode_core
      - decode_core
      - compute_cid
      - sign_core
      - verify_attestations
      - project_document
      - validate_projection
      - verify_chain
      - create_terminal_core
      - create_data_integrity_proof
      - verify_data_integrity_proof
    required_capabilities:
      - did_me_default_profile
      - alg_ed25519
      - alg_x25519
      - alg_p256
      - alg_mldsa87
    required_capability_sets:
      key_agreement_pq:
        one_of:
          - alg_mlkem768
          - alg_mlkem1024
    optional_capabilities:
      - alg_secp256k1
      - alg_mldsa44
      - alg_mldsa65
      - alg_mlkem768
      - alg_mlkem1024
    checks:
      validate_projection:
        - context_tuple
        - identifier_syntax
        - core_cbor_consistency
        - sequence_prev_key_history
        - attestations
        - data_integrity_proof
        - genesis_binding
        - update_threshold
        - messaging_service_entries
        - key_encoding
        - default_profile_key_set
        - default_profile_pq_attestation
        - canonical_bytes_authoritative
      verify_attestations:
        - vm_reference_resolves
        - alg_matches_verification_method
        - threshold_met
        - distinct_methods
        - allowed_verification_methods
        - controller_membership
        - signing_input_domain_tag
        - default_profile_pq_attestation
      verify_data_integrity_proof:
        - data_integrity_proof
        - unsupported_suite_handling
        - ecdsa_s_value_acceptance
      verify_chain:
        - genesis_binding
        - version_in_verified_chain
        - prev_links
        - monotonic_sequence
        - rollback_regression
        - terminal_core_finality
        - canonical_bytes_authoritative
    conformance_vectors:
      upstream_url: https://did-me.org/spec/v1/vectors/
      source_repository: reallyme/identity-sdk
      source_url: https://github.com/reallyme/identity-sdk/tree/main/vectors/
      source: vectors/
      published_manifest_url: https://github.com/reallyme/identity-sdk/blob/main/vectors/manifest.json
      published_manifest: vectors/manifest.json
      validator_url: https://github.com/reallyme/identity-sdk/blob/main/scripts/validate_didme_vectors.mjs
      validator: scripts/validate_didme_vectors.mjs
      validator_policy: "zero_known_failures"
      published_files:
        - p256.json
        - ed25519.json
        - secp256k1.json
        - x25519.json
        - mldsa87.json
        - mlkem768.json
        - mlkem1024.json
        - didme-genesis.json
        - messaging-service.json
      family_coverage:
        identifier_syntax:
          source: spec_inline
          section: "17.6.3"
          notes: "Inline vector exercises case rejection; normative syntax also covers HRP me, BIP-173 checksum, Bech32m rejection, charset, and data length."
        context_tuple:
          source: spec_inline
          section: "17.1"
        core_cbor_consistency:
          source: spec_inline
          section: "17.2"
        sequence_prev_key_history:
          source: spec_inline
          section: "17.3"
        attestations:
          source: spec_inline
          section: "17.4"
        data_integrity_proof:
          source: spec_inline
          section: "17.5"
        genesis_binding:
          source: published_vector
          files: [didme-genesis.json]
        update_threshold:
          source: spec_inline
          section: "17.7"
        messaging_service_entries:
          source: published_vector
          files: [messaging-service.json]
        key_encoding:
          source: published_vector
          files: [p256.json, ed25519.json, secp256k1.json, x25519.json, mldsa87.json, mlkem768.json, mlkem1024.json]
      schema_notes:
        - "mldsa87.json publishes top-level root-compatible ML-DSA-87 material plus keypairs.root and keypairs.auth entries so genesis #mldsa87-root and #mldsa87-auth are both reproducible from published vectors."
        - "didme-genesis.json is computed from the published per-algorithm vectors; any mismatch between genesis controller keys and vector-file keys is a hard validator failure."
    profile_notes:
      default_profile_key_set:
        - "#ed25519 and #mldsa87-auth in authentication"
        - "#p256 in assertionMethod"
        - "#mldsa87-root in capabilityInvocation and updatePolicy.allowedVerificationMethods"
        - "#x25519 and at least one ML-KEM key in keyAgreement"
      default_profile_pq_attestation:
        - "attestations MUST include at least one ML-DSA-87 core signature and must still satisfy the active threshold."
    notes:
      - did:me identifiers are genesis-bound to nonce, controllerKeys, and updatePolicy. Current keys and core CIDs never define the DID string.
      - did:me v1 update authorization is evaluated against the previously active updatePolicy and controllerKeys.
      - did:me CID derivation and authoritative attestation verification MUST use canonical DAG-CBOR core bytes only; protobuf, Buffa, or compressed protobuf payloads are transport/storage projections and never authoritative signing input.
      - Per-key controller ownership is intentionally deferred to future profiles; v1 attestation validity depends on membership in at least one currently active controller.

