    category: feature
    version: "1.0"
    status: supported
    requires: []
    conflicts_with: []
  credential_issuance:
    category: feature
    version: "1.0"
    status: supported
    requires:
      - holder_binding
    conflicts_with: []
    notes:
      - Covers issuer-side credential issuance through the local Identity facade; protocol-specific request validation and credential construction remain owned by sibling crates.
  credential_validation:
    category: feature
    version: "1.0"
    status: supported
    requires:
      - did_resolution
    conflicts_with: []
    notes:
      - Covers provider-backed credential validation policy, including signature, issuer, status, schema, trust, and binding checks.
  credential_status_check:
    category: feature
    version: "1.0"
    status: supported
    requires:
      - credential_validation
    conflicts_with: []
    notes:
      - Covers local-or-remote credential status evidence checks without implying hosted wallet inventory mutation.
  trust_evaluation:
    category: feature
    version: "1.0"
    status: supported
    requires: []
    conflicts_with: []
    notes:
      - Covers local trust evaluation over configured trust anchors, trust lists, status evidence, and policy.
  trust_list_ingestion:
    category: feature
    version: "1.0"
    status: supported
    requires:
      - trust_evaluation
    conflicts_with: []
    notes:
      - Covers verified trusted-list ingestion; package lanes must fail closed unless XMLDSig verification is available or injected.
  status_resolution:
    category: feature
    version: "1.0"
    status: supported
    requires:
      - credential_status_check
    conflicts_with: []
    notes:
      - Covers aggregate status resolution across token status lists, bitstring status lists, CRLs, OCSP, and future status mechanisms.
