---
schema: reallyme.identity.master_taxonomy.v1
title: Master identity taxonomy for ReallyMe Identity
status: proposal
product_name: ReallyMe Identity
taxonomy:
  major: 0
  minor: 0
  patch: 1
  versioning_note: >
    Initial public taxonomy release. Earlier internal draft names are
    non-normative.

# -----------------------------------------------------------------------------
# CONVENTIONS
# -----------------------------------------------------------------------------

naming:
  convention: identity.<resource>.<command> | identity.<resource>.<subresource>.<command>
  rules:
    - Resource collections are plural snake_case (dids, credentials, presentations).
    - Sub-resources are allowed one level deep (dids.keys, wallets.credentials, trust.lists).
    - Commands are verb-first snake_case; language bindings map to camelCase.
    - Request fields and enum values are never commands.
    - The local package may expose a bound singleton for the active instance
      (identity.wallet is the open wallet; the hosted resource is wallets).

modeling_rules:
  commands: An operation a caller invokes. Verbs only.
  request_fields: >
    Inputs to a command. Anything that was set_<field> in v1 is a request
    field on create/update/configure, not a command.
  checks: >
    Named validation units executed by aggregate validate/verify commands and
    returned as ValidationResult.checks[] rows. Checks are registry entries,
    not commands. Callers may restrict a validation run to a subset of checks
    for diagnostics.
  canonical_for: >
    When an operation could live in several groups, exactly one group is
    canonical. Other groups reference it as a view (actor-seat convenience) or
    a mechanism (lower-level machinery the canonical command drives).
  command_overrides: >
    Group-level scope and owner are defaults. A command may override owner,
    surfaces, capability, or availability when one resource mixes local package,
    hosted service, platform-native, or sibling-crate behavior.
  command_metadata: >
    Commands may be declared as plain verb strings or maps keyed by verb. Mapped
    commands may carry stability, deprecation, capability, actor, ownership, and
    operation metadata without changing the taxonomy schema.
  deprecation:
    since: First taxonomy or package version where the command became deprecated.
    replacement: Stable operation_id or canonical command path callers should use instead.
    removal_target: Earliest major version where the command may be removed.
  stability:
    stable: Supported public surface.
    preview: Public shape may still evolve.
    experimental: Visible only when explicitly enabled.
    internal: Not shown in public docs or generated public bindings.
  command_capabilities:
    requires: Capabilities required for the command to be supported.
    optional: Capabilities that enrich the command when present.
  operation_metadata: >
    Operation registry entries may carry security, behavior, events, scopes,
    names, visibility, module ownership, performance, operation type, interop,
    documentation, and breaking-change metadata for code generation and docs.
  sdk_registry_types: >
    The top-level types: catalog defines shared taxonomy/result shapes only.
    sdk_command_registry input_type, output_type, error_type, and per-boundary
    request_type/response_type names resolve against the declared DTO backing:
    shared/result types live in types:, while concrete Rust, protobuf, wallet
    core RPC, or language-facade DTOs must be declared in sdk_dto_registry and
    explained by the command's dto_backing and lane metadata. proto_package is
    only a namespace hint; it is not evidence that request/response DTOs exist.
    Commands backed by protobuf or wallet-core RPC must name the exact
    proto_messages they rely on. Do not add shallow types: stubs solely to
    mirror generated or crate-local DTO names.
  breaking_changes:
    since: First version where the breaking change applies.
    replacement: Stable replacement operation_id or command path.
    migration_notes: Non-normative migration guidance for developers.
  availability: >
    Commands that depend on platform APIs, device hardware, native crypto
    providers, browser APIs, or hosted infrastructure must declare where they
    are available before they graduate into generated bindings.
  scope:
    core: Identity credential flows the product is committed to.
    platform: Hosted-platform operations (tenancy, keys, ops, billing).
    adjacent: Aspirational adjacent capabilities. Not roadmap commitments.
  owner:
    sdk_local: Public Identity package facade (Rust, FFI, WASM, TS, Swift, Kotlin).
    hosted_service: Hosted APIs and administration.
    sibling_repo: Protocol/core crates (reallyme-openidvc, reallyme-openid4vp, reallyme-wallet, reallyme-zk-api, reallyme-crypto, identity core).
    diagnostics: Exposed only where it makes developers safer.
  execution: >
    Component that actually performs or persists an operation. This is separate
    from owner, which names the component responsible for the public command
    contract.

fail_closed_capabilities:
  rule: >
    A command invoked with inputs that require a capability the current
    configuration does not provide MUST fail closed with a typed
    unsupported_capability error. It MUST NOT silently degrade, partially
    dereference, or fall back to behavior the capability registry does not
    declare. DID URL path and query dereferencing without a method resolver is
    the canonical example.

feature_flags:
  eudi:
    enabled: true
  remote_signing:
    enabled: false
  qualified_signatures:
    enabled: false
  zero_knowledge:
    enabled: optional

