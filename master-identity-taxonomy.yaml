        - certificate
        - trust_list_entry
        - valid_at_time

  signatures:
    # Electronic signatures (natural persons) and seals (legal entities) share
    # one lifecycle; kind is a request field. Qualification is an achieved
    # validation result backed by evidence, not a caller-controlled flag.
    scope: core
    owner: sibling_repo
    commands:
      - create
      - request
      - authorize
      - validate
      - extend_validation_data
      - get_status
      - extract_signer
      - extract_signed_attributes
    request_fields:
      create_request:
        kind:
          enum: [signature, seal]
        requested_level:
          enum: [basic, advanced, qualified]
    response_fields:
      create:
        achieved_level:
          enum:
            - basic
            - advanced
            - qualified
            - indeterminate
        qualification_evidence:
          - certificate_chain
          - trust_service
          - creation_device
          - policy
          - timestamp
          - validation_report
    checks:
      validate:
        common:
          - cryptographic_signature
          - certificate
          - certificate_chain
          - revocation
          - signature_policy
          - timestamp
          - long_term_evidence
        by_kind:
          signature:
