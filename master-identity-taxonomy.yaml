  did_me_default_profile:
    category: protocol
    version: "1"
    status: experimental
    requires:
      - did_creation
      - did_resolution
      - did_update
      - alg_ed25519
      - alg_x25519
      - alg_p256
      - alg_mldsa87
    conflicts_with: []
    notes:
      - did:me v1 default profile requires post-quantum control through ML-DSA-87.
      - did:me v1 default profile also requires hybrid key agreement with X25519 plus at least one of ML-KEM-768 or ML-KEM-1024.
