# ---------------------------------------------------------------------------
# RECOMMENDED TOP-LEVEL CLIENTS
# ---------------------------------------------------------------------------

clients:
  - IdentityClient
  - IssuerClient
  - WalletClient
  - VerifierClient
  - TrustClient
  - EudiClient
  - QualifiedTrustServicesClient
  - AdminClient


# ---------------------------------------------------------------------------
# RECOMMENDED HIGH-LEVEL METHODS
# ---------------------------------------------------------------------------

high_level_methods:
  canonical:
    - issuance.issue
    - credential_offers.create
    - credential_state.revoke
    - credential_requests.request
    - wallets.credentials.store
    - presentations.request
    - presentations.present
    - presentations.verify
    - credentials.validate
    - trust.evaluate
    - eudi.credentials.validate   # category: pid | qeaa | pub_eaa | eaa
  profile_views:
    eudi.credentials.issue:
      canonical_command: issuance.issue
      category: pid | qeaa | pub_eaa | eaa
    eudi.credentials.present:
      canonical_command: presentations.present
      category: pid | qeaa | pub_eaa | eaa
    eudi.credentials.revoke:
      canonical_command: credential_state.revoke
      category: pid | qeaa | pub_eaa | eaa
  language_bindings:
    typescript:
      issuance.issue: issuer.issueCredential
      credential_offers.create: issuer.createCredentialOffer
      credential_state.revoke: issuer.revokeCredential
      credential_requests.request: wallet.acceptCredentialOffer
      wallets.credentials.store: wallet.storeCredential
      presentations.request: verifier.createPresentationRequest
      presentations.present: wallet.present
      presentations.verify: verifier.verifyPresentation
      credentials.validate: verifier.verifyCredential
      trust.evaluate: trust.evaluate
    rust:
      issuance.issue: issuer.issue_credential
      credential_offers.create: issuer.create_credential_offer
      credential_state.revoke: issuer.revoke_credential
      credential_requests.request: wallet.accept_credential_offer
      wallets.credentials.store: wallet.store_credential
      presentations.request: verifier.create_presentation_request
      presentations.present: wallet.present
      presentations.verify: verifier.verify_presentation
      credentials.validate: verifier.verify_credential
      trust.evaluate: trust.evaluate


# ---------------------------------------------------------------------------
# RECOMMENDED RESULT TYPES
# ---------------------------------------------------------------------------

types:
  IdentityResult:
    generic: true
    success_value: T
    error:
      $ref: IdentityError
    language_bindings:
      rust: Result<T, IdentityError>
      typescript: Result<T, IdentityError>
      swift: Result<T, IdentityError>
      kotlin: Result<T, IdentityError>

  IdentityError:
    proto_message: reallyme.identity.sdk.v1.IdentitySdkError
    proto_enum_links:
      domain: reallyme.identity.common.v1.IdentityStackErrorDomain
      code: reallyme.identity.sdk.v1.IdentitySdkErrorReason
      wallet_reason: reallyme.identity.sdk.v1.IdentitySdkWalletErrorReason
      did_reason: reallyme.identity.sdk.v1.IdentitySdkDidErrorReason
      credential_reason: reallyme.identity.sdk.v1.IdentitySdkCredentialErrorReason
      presentation_reason: reallyme.identity.sdk.v1.IdentitySdkPresentationErrorReason
      provider_reason: reallyme.identity.sdk.v1.IdentitySdkProviderErrorReason
    domain:
      type: string
      proto_enum: reallyme.identity.common.v1.IdentityStackErrorDomain
    code:
      type: string
      proto_enum: reallyme.identity.sdk.v1.IdentitySdkErrorReason
    category:
      derived_from:
        - reallyme.identity.sdk.v1.IdentitySdkWalletErrorReason
        - reallyme.identity.sdk.v1.IdentitySdkDidErrorReason
        - reallyme.identity.sdk.v1.IdentitySdkCredentialErrorReason
        - reallyme.identity.sdk.v1.IdentitySdkPresentationErrorReason
        - reallyme.identity.sdk.v1.IdentitySdkProviderErrorReason
      enum:
        - invalid_request
        - protocol_error
        - cryptographic_error
        - trust_error
        - status_error
        - policy_error
        - network_error
        - provider_error
        - unsupported_capability
        - internal_error
    message:
      type: string
      pii: forbidden
      stability: diagnostic
    retryable: boolean
    details:
      type: object
      pii: forbidden
      constraint: stable_non_secret_fields_only
    cause:
      type: object
      pii: forbidden
      constraint: sanitized_cause_chain_only
    trace_id: string

  Capability:
    id: string
    category:
      enum:
        - credential_format
        - protocol
        - transport
        - trust_framework
        - algorithm
        - proof_suite
        - feature
        - status_mechanism
    version: string
    status:
      enum:
        - supported
        - experimental
        - unavailable
    requires: array
    conflicts_with: array

  VerificationContext:
    evaluation_time:
      type: datetime
      required: true
    historical_validation_time:
      type: datetime
      required: false
    presentation_time:
      type: datetime
      required: false
    request_received_at:
      type: datetime
      required: false
    clock_skew_seconds:
      type: integer

    network:
      access:
        enum:
          - required
          - preferred
          - forbidden
      cache:
        enum:
          - bypass
          - prefer
          - require
          - allow_stale
      maximum_staleness: duration

    trust_policy_id: string
    trust_snapshot_id: string
    status_snapshot_id: string

    historical_validation:
      enabled: boolean
      require_historical_status: boolean

    evidence_retention:
      enum:
        - none
        - summary
        - complete

  DisclosureConfiguration:
    selectively_disclosable: array
    always_disclosed: array
    never_disclosed: array

  CredentialStatusConfiguration:
    method:
      enum:
        - token_status_list
        - bitstring_status_list
        - issuer_endpoint
        - none
    configuration_id: string
    list_id: string

  DidResolutionResult:
    document: DidDocument
    resolution_metadata:
      content_type: string
      retrieved_at: datetime
      resolver: string
      error: string
      assurance_achieved:
        enum:
          - attestation_verified
          - chain_verified
      sequence: integer
      deactivation_status:
        enum:
          - active
          - deactivated
          - absent
    document_metadata:
      created: datetime
      updated: datetime
      deactivated: boolean
      version_id: string
      next_version_id: string

  CheckResult:
    name: string
    outcome:
      enum:
        - pass
        - fail
        - skipped
        - indeterminate
        - not_applicable
    severity:
      enum:
        - info
        - warning
        - error
        - fatal
    code: string
    message: string
    mandatory: boolean
    source: string
    started_at: datetime
    completed_at: datetime
    evidence: object
    duration_ms: integer

  VerificationProvenance:
    evaluated_at: datetime
    valid_at: datetime
    policy_id: string
    policy_version: string
    standards_versions:
      did_me: string
      w3c_did_core: string
      openid4vp: string
      openid4vci: string
      sd_jwt_vc: string
      iso_18013_5: string
      eudi_wallet_arf: string
    trust_snapshot_id: string
    status_snapshot_id: string
    schema_snapshot_id: string
    resolvers:
      did_resolver: string
      trust_resolver: string
      status_resolver: string
    evidence_digest: string
    trace_id: string

  ValidationResult:
    valid: boolean
    decision:
      enum:
        - allow
        - deny
        - indeterminate
        - review

    checks:
      # Rows correspond to entries in per-resource check registries.
      type: array
      items:
        $ref: CheckResult

    provenance:
      $ref: VerificationProvenance

    credential:
