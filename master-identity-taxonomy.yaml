  # OPENID4VCI ISSUANCE PROTOCOL (mechanism layer for issuance and credential requests)
  # ---------------------------------------------------------------------------

  openid4vci:
    scope: core
    owner: sibling_repo
    mechanism_for: [issuance.issue, credential_requests.request, credential_offers]
    standards:
      - openid4vci
      - oauth_authorization_server_metadata
      - oauth_attestation_based_client_authentication
      - oauth_authorization_details
      - oauth_pushed_authorization_requests
      - dpop
    subresources:
      issuer_metadata:
        commands: [publish, fetch, resolve, validate, cache, refresh]
      authorization_server_metadata:
        commands: [publish, fetch, resolve, validate, cache, refresh]
      offer:
        # Wire encoding/decoding only. Offer lifecycle is credential_offers.
        commands: [encode, parse, validate]
      authorization:
        standards:
          - oauth_authorization_details
          - oauth_pushed_authorization_requests
        commands:
          create_request:
            actor: holder_wallet
          validate_request:
            actor: authorization_server
          start:
            actor: holder_wallet
          continue:
            actor: holder_wallet
          handle_callback:
            actor: holder_wallet
          create_authorization_details:
            actor: holder_wallet
          validate_authorization_details:
            actor: authorization_server
          create_pushed_authorization_request:
            actor: holder_wallet
          exchange_code:
            actor: holder_wallet
          verify_pkce:
            actor: authorization_server
      client_authentication:
        # HAIP: OAuth 2.0 Attestation-Based Client Authentication and DPoP.
        # Wallet-attestation issuance is canonical at wallet_attestations.issue.
        specification: oauth_attestation_based_client_authentication
        commands:
          prepare_wallet_attestation:
            actor: holder_wallet
          create_client_attestation_pop:
            actor: holder_wallet
          verify_wallet_attestation:
            actor: authorization_server
          verify_client_attestation_pop:
            actor: authorization_server
          create_dpop_proof:
            actor: holder_wallet
          verify_dpop_proof:
            actor:
              - authorization_server
              - credential_issuer
      pre_authorized_code:
        commands: [create, validate, redeem, revoke]
        request_fields:
          create:
            - transaction_code
      token:
        commands:
          create_request:
            actor: holder_wallet
          handle_request:
            actor: authorization_server
          issue:
            actor: authorization_server
          refresh_request:
            actor: holder_wallet
          revoke:
            actor:
              - holder_wallet
              - authorization_server
          introspect:
            actor: authorization_server
      nonce:
        commands: [request, create, validate, consume, expire]
      proof:
        commands: [create, validate]
        request_fields:
          create:
            proof_type:
              enum: [jwt, attestation]
        checks:
          validate: [nonce, audience, key_binding, attestation]
      credential_endpoint:
        commands:
          request:
            actor: holder_wallet
          request_batch:
            actor: holder_wallet
          decrypt_response:
            actor: holder_wallet
          issue:
            actor: credential_issuer
          issue_batch:
            actor: credential_issuer
          return_error:
            actor: credential_issuer
        request_fields:
          request:
            - credential_identifier
            - proof
            - credential_response_encryption
          request_batch:
            - credential_identifiers
            - proofs
            - credential_response_encryption
          decrypt_response:
            - encrypted_response
            - wallet_key
            - expected_issuer
      deferred_endpoint:
        commands:
          request:
            actor: holder_wallet
          retrieve:
            actor: holder_wallet
          complete:
            actor: credential_issuer
          return_error:
            actor: credential_issuer
      notification:
        commands:
          send:
            actor: holder_wallet
          receive:
            actor: credential_issuer
          validate:
            actor: credential_issuer
          acknowledge:
            actor: credential_issuer
      error:
        commands: [parse, normalize, map, retry_policy]


