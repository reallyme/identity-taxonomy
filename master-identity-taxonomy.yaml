          evidence: {}
          duration_ms: 0

  verify_presentation_dc_api:
    method: verifier.verifyPresentation
    input:
      response: presentation_response

      expected:
        nonce: expected_nonce
        audience: verifier_identifier
        expected_origins:
          - https://bank.example
        transaction_data: expected_transaction_data

      verification_context:
        evaluation_time: now
        presentation_time: presentation_received_at
        network:
          access: preferred
          cache: prefer
          maximum_staleness: PT5M
        evidence_retention: summary

      policy:
        required_credentials:
          - credential_type: eu.europa.ec.eudi.pid.1

        required_claims:
          - given_name
          - family_name
          - birth_date

        allowed_formats:
          - dc+sd-jwt
          - mso_mdoc

        require_holder_binding: true
        require_wallet_attestation: true
        require_active_status: true
        require_trusted_issuer: true

  issue_credential:
    method: issuer.issueCredential
    input:
      credential_configuration_id: pid_sd_jwt

      subject:
        identifier: subject_identifier

      claims:
        given_name: Example
        family_name: Person
        birth_date: "1990-01-01"

      format: dc+sd-jwt

      binding:
        method: jwk
        key_id: holder_key_id
        did: null
        certificate: null

      validity:
        not_before: datetime
        expires_at: datetime

      disclosure:
        selectively_disclosable:
          - given_name
          - family_name
          - birth_date
        always_disclosed:
          - issuing_country
        never_disclosed: []

      status:
        method: token_status_list
        list_id: status_list_id

      evidence: []
      idempotency_key: unique_request_key

  revoke_credential:
    method: issuer.revokeCredential
    input:
      credential_id: credential_id
      reason_code: validity_ended_early
      effective_at: now
      idempotency_key: unique_request_key
    output_example:
      status: revoked
      effective_at: now


# ---------------------------------------------------------------------------
# IMPORTANT SDK SEMANTICS
# ---------------------------------------------------------------------------

semantics:
  credential_immutability:
    rule: >
      An issued and signed credential must not be modified in place.
      Use replace, reissue, renew, refresh, suspend, supersede or revoke.

  fields_vs_commands:
    rule: >
      Configuration and policy fields are request fields on create, update or
      configure commands, never per-field setter commands. The public package
      takes typed request objects.

  checks_vs_commands:
    rule: >
      Aggregate validate and verify commands run named checks from per-resource
      check registries and return them as ValidationResult.checks rows. Checks
      are diagnostics-addressable (callers may run a subset) but are not
      individual API commands.

  canonical_commands:
    rule: >
      Each operation has exactly one canonical home. issuance owns issuing and
      deferred issuance; credential_state owns state transitions, lifecycle
      history, and status checking; credential_offers owns offers; presentations owns
      the presentation flow; discovery owns entity metadata. openid4vci,
      openid4vp, sd_jwt, mdoc and status_lists are mechanisms those commands
      drive. wallets exposes actor views over canonical commands, not duplicates.

  validation:
    rule: >
      credentials.validate and presentations.verify are aggregate,
      developer-friendly operations. Check subsets remain available for
      diagnostics and policy engines.

  trust_vs_signature:
    rule: >
      Cryptographic validity and ecosystem trust are independent.
      A credential may have a valid signature but an unauthorized or
      untrusted issuer.

  status_vs_signature:
    rule: >
      A credential may be correctly signed but suspended, revoked,
      superseded or expired.

  did_usage:
    rule: >
      DID support is optional. Trust may be based on DIDs, X.509 certificates,
      federation metadata, trust registries, trusted lists or configured
      trust anchors.

  selective_disclosure:
    rule: >
      SD-JWT supports selective disclosure. Arbitrary zero-knowledge predicates
      are exposed through pluggable proof suites (reallyme-zk-api) and must not
      be treated as universally supported SD-JWT functionality.

  client_authentication:
    rule: >
      HAIP-profile issuance requires wallet attestation presented as OAuth 2.0
      attestation-based client authentication at the authorization server, and
      DPoP where the profile mandates it. These live under
      openid4vci.client_authentication.

  european_validation_time:
    rule: >
      European trust validation supports validation at issuance time,
      presentation time and an explicitly supplied historical time.

  european_credential_categories:
    rule: >
      PID, QEAA, PuB-EAA and non-qualified EAA share one lifecycle
      (eudi.credentials) parameterized by category. Their distinct issuer
      authorization and trust-validation rules are expressed as per-category
      checks, not duplicated command sets.

  scope_flags:
    rule: >
      Groups flagged scope: adjacent (risk, fraud, screening, compliance and
      the presentation-exchange adapter) are aspirational adjacent
      capabilities, not roadmap commitments.

  state_changing_operations:
    common_parameters:
      - idempotency_key
      - correlation_id
      - actor
      - reason
      - metadata

  network_operations:
    common_parameters:
      - timeout
      - retry_policy
      - cancellation
      - trace_context

  validation_operations:
    rule: >
      Validation operations return structured checks, evidence, warnings and
      errors rather than only a boolean.

  api_layers:
    rule: >
      High-level methods serve most developers. Protocol-level OpenID4VCI,
      OpenID4VP, SD-JWT, mdoc and trust-list APIs remain available for
      infrastructure providers and advanced integrations.
