          validate:
            actor: holder_wallet
          resolve_request_uri:
            actor: holder_wallet
        checks:
          validate: [client_id, client_metadata, signature, expected_origins]
      authorization_response:
        commands:
          create:
            actor: holder_wallet
          encrypt:
            actor: holder_wallet
