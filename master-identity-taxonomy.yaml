    standards:
      - openid4vp
      - openid_federation
    response_modes:
      fragment:
        transport: redirect
        encryption: false
        status: default_for_vp_token
      query:
        transport: redirect
        encryption: false
        status: inherited_oauth_mode
      direct_post:
        transport: https_post
        encryption: false
      direct_post.jwt:
        transport: https_post
