    category: protocol
    version: "1.0"
    status: supported
    requires:
      - wallet
      - holder_binding
    conflicts_with: []
    notes:
      - Covers wallet-side OpenID4VCI credential acquisition from an offer; issuer endpoint state machines remain in reallyme-openidvc.
  openid4vp:
    category: protocol
    version: "1.0"
    status: supported
    requires:
      - holder_binding
    conflicts_with: []
    notes:
      - Covers OpenID4VP presentation request, presentation, and verification facade flows backed by reallyme-openid4vp.
  verifier:
    category: feature
    version: "1.0"
    status: supported
    requires:
      - openid4vp
    conflicts_with: []
    notes:
      - Covers verifier-side request construction and presentation verification surfaces exposed through the local Identity facade.
  presentation_verification:
    category: feature
    version: "1.0"
    status: supported
    requires:
      - openid4vp
      - verifier
    conflicts_with: []
    notes:
