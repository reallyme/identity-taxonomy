    status: final
    support: optional
  etsi_ts_119_612:
    version: "2.4.1"
    status: published
    support: required
  etsi_en_319_401:
    version: "3.2.1"
    status: published
    support: optional
  etsi_en_319_411_1:
    version: "1.5.1"
    status: published
    support: optional
  etsi_en_319_411_2:
    version: "2.6.1"
    status: published
    support: optional
  etsi_en_319_421:
    version: "1.3.1"
    status: published
