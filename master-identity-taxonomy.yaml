credential_formats:
  core:
    sd_jwt_vc:
      name: IETF SD-JWT VC
      support: required
      openid_format_identifier: dc+sd-jwt
      media_types:
        - application/dc+sd-jwt
      jose_typ_values:
        current: dc+sd-jwt
        legacy:
          - vc+sd-jwt
      specification: sd_jwt_vc
    mdoc:
      name: ISO/IEC 18013-5 mdoc
      support: required
      openid_format_identifier: mso_mdoc
      specifications:
        - iso_18013_5
  compatibility:
    w3c_vc_jwt:
      name: W3C VC secured as JWT
      support: compatibility
      data_model: w3c_vc_data_model
      openid_format_identifier: jwt_vc_json
      status: compatibility
    w3c_vc_data_integrity:
      name: W3C VC secured with Data Integrity
      support: optional
      data_model: w3c_vc_data_model
      openid_format_identifier: ldp_vc
      status: compatibility

standards:
  w3c_did_core:
    version: "1.0"
    status: w3c_recommendation
    support: required
  w3c_did_resolution:
    version: "0.3"
    status: w3c_working_draft
    support: required
  did_me:
    version: "1"
    status: beta
    specification_uri: https://did-me.org/spec/v1/
    support: required
    profile: default
  openid4vci:
    version: "1.0"
    status: final
    support: required
  openid4vp:
    version: "1.0"
    status: final
    support: required
  haip:
    version: "1.0"
    status: final
    support: required
  eudi_wallet_arf:
    version: "2.0"
    latest_known: "2.9.0"
    latest_known_date: "2026-05-21"
    status: published
    version_policy: pinned
    support: required
    notes:
      - "Pinned at 2.0 as the taxonomy baseline; review latest_known before certification claims."
  sd_jwt:
    version: RFC9901
    status: final
    support: required
  sd_jwt_vc:
    family: draft-ietf-oauth-sd-jwt-vc
    pinned_version: "17"
    status: draft
    support: required
  token_status_list:
    family: draft-ietf-oauth-status-list
    pinned_version: "21"
    status: draft
    support: required
    watch: RFC editor queue; replace pinned draft with RFC number when published.
    terminology:
      mechanism: token_status_list
      issued_artifact: status_list_token
  bitstring_status_list:
    specification: w3c_vc_bitstring_status_list
    version: "1.0"
    status: w3c_recommendation
    support: optional
  iso_18013_5:
    version: "2021"
    status: published
    support: required
    notes:
      - "Edition 2 is expected to add mdoc revocation/status-list mechanics; keep status checks mode-dependent until then."
  iso_18013_7:
    version: "2025"
    status: published
    support: optional
  w3c_vc_data_model:
    version: "2.0"
    status: w3c_recommendation
    support: compatibility
  dpop:
    version: RFC9449
    status: final
    support: required
  oauth_authorization_server_metadata:
    version: RFC8414
    status: final
    support: required
  oauth_attestation_based_client_authentication:
