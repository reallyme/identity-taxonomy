identity:
  # ---------------------------------------------------------------------------
  # SDK AND PLATFORM
  # ---------------------------------------------------------------------------

  sdk:
    scope: core
    owner: sdk_local
    commands:
      - configure
    request_fields:
      configure:
        - environment
        - region
        - tenant
        - api_key
        - client_credentials
        - signing_key
        - encryption_key
        - trust_policy
        - protocol_profile
        - credential_formats
        - locale
        - clock_skew
        - http_client
        - logger
        - telemetry
        - storage_adapter
    subresources:
      capabilities:
        # Canonical home for "what does this build support" queries.
        # Discovery of remote entities lives in the discovery group.
        canonical_for: [supported_capability_queries]
        commands:
          - get
        response_fields:
          get:
            - capabilities
      diagnostics:
        owner: diagnostics
        commands:
          - health_check
          - validate_configuration
          - test_connectivity
          - test_signing
          - test_encryption
          - test_trust_resolution
          - get_request_trace
          - decode_error


  # ---------------------------------------------------------------------------
  # TENANTS, ORGANISATIONS, SUBJECTS AND REGISTERED PARTIES
  # ---------------------------------------------------------------------------

  tenants:
    scope: platform
    owner: hosted_service
    commands:
      - create
      - get
      - list
      - update
      - suspend
      - activate
      - delete
    request_fields:
      create_update:
        - regions
        - data_residency
        - retention_policy
        - webhook_defaults
        - trust_policy
        - risk_policy

  organisations:
    scope: platform
    owner: hosted_service
    commands:
      - create
      - get
      - list
      - update
      - verify
      - suspend
      - activate
      - delete
      - get_registration_status
    subresources:
      identifiers:
        commands: [add, remove]
      domains:
        commands: [add, verify, remove]
      certificates:
        commands: [add, remove]
      trust_frameworks:
        commands: [add, remove]

  subjects:
    # The person or entity credentials are about. Required for a hosted
    # service: a subject's credentials, consents, sessions, and data-subject
    # rights hang here.
    scope: platform
    owner: hosted_service
    commands:
      - create
      - get
      - list
      - update
      - merge
      - delete
    subresources:
      credentials:
        commands: [list]
      consents:
        commands: [list]
      sessions:
        commands: [list]
      data:
        # GDPR / data-subject rights. Mechanisms live in the privacy group.
        commands: [export, delete]

  issuers:
    scope: platform
    owner: hosted_service
    commands:
      - register
      - get
      - list
      - update
      - suspend
      - activate
      - deregister
      - publish_metadata
      - validate_metadata
      - rotate_keys
      - rotate_certificates
    request_fields:
      register_update:
        - authorization_server
        - notification_endpoint
        - status_provider
        - trust_framework
    subresources:
      credential_configurations:
        # View over the credential_configurations resource scoped to an issuer.
        view_of: credential_configurations
        commands: [register, update, remove]

  verifiers:
    scope: platform
    owner: hosted_service
    commands:
      - register
      - get
      - list
      - update
      - suspend
      - activate
      - deregister
      - publish_metadata
      - validate_metadata
      - rotate_keys
      - rotate_certificates
    request_fields:
      register_update:
        - response_endpoint
        - trust_policy
        - presentation_policy
    subresources:
      clients:
        commands: [register, update, remove]

  wallet_providers:
    scope: platform
    owner: hosted_service
    commands:
      - register
      - get
      - list
      - update
      - suspend
      - activate
      - deregister
      - publish_metadata
      - validate_metadata
      - register_wallet_solution
      - rotate_keys
      - rotate_certificates
    request_fields:
      register_update:
        - attestation_policy
        - backup_policy
        - device_policy
        - wallet_instance_policy
    views:
      issue_wallet_attestation:
        canonical_command: wallet_attestations.issue
        actor: wallet_provider


  # ---------------------------------------------------------------------------
  # IDENTIFIERS AND DIDs
  # ---------------------------------------------------------------------------

  identifiers:
    # Abstraction over identifier systems (DIDs, X.509 subjects, federation
    # entity ids). dids extends this for DID-specific structure.
    scope: core
    owner: sdk_local
    commands:
      - parse
      - resolve
      - validate
      - classify
      - get_history
    subresources:
      bindings:
        commands: [bind_key, unbind_key, bind_certificate, unbind_certificate]

  did_method_capabilities:
    scope: core
    owner: sibling_repo
    values:
      - parse
      - dereference
      - resolve
      - create
      - update
      - deactivate
      - reactivate
      - recover
      - migrate
      - services
      - multiple_controllers
      - key_rotation
      - threshold_update_policy
      - seed_derived_recovery
      - genesis_bound_identifier
      - chain_verification
      - version_resolution
      - terminal_deactivation
      - directory_publication
      - messaging_pre_keys
      - domain_verification
      - post_quantum_algorithms
      - data_integrity_proof

  dids:
    scope: core
    owner: sdk_local
    extends: identifiers
    commands:
      - create
      - parse
      - dereference:
          requires:
            - did_local_dereferencing
          optional:
            - did_url_dereferencing
      - resolve
      - validate
      - update
      - deactivate
      - reactivate
      - migrate
      - recover
      - export
      - import
      - get_history
    # Method capability names below resolve against did_method_capabilities.values.
    # Command metadata requires/optional entries resolve against capability_registry.
    capability_requirements:
      create: create
      parse: parse
      dereference: dereference
      update: update
      deactivate: deactivate
      reactivate: reactivate
      migrate: migrate
      recover: recover
    request_fields:
      create:
        - nonce_derivation
        - controllers
        - controller_keys
        - update_policy
        - relationships
        - services
        - profile
      resolve:
        - did
        - version_id
        - version_time
        - assurance
        - freshness
      dereference:
        - did_url
        - resolution_options
      update:
        - also_known_as
        - hardware_bound
        - biometric_protected
        - user_verification_method
        - device_model
        - projection_only_metadata
      recover:
        method:
          enum: [seed_derived, backup_key, threshold]
      export:
        scope:
          enum: [document, current_core, full_chain]
    field_notes:
      create:
        nonce_derivation:
          enum: [random, seed_derived]
        profile:
          enum: [default, private]
      resolve:
        assurance:
          enum: [attestation_verified, chain_verified]
      dereference:
        did_url: >
          Bare DID and fragment dereferencing are local against an already
          resolved DID document. DID URL path and query dereferencing require
          did_url_dereferencing because service selection, relativeRef, and
          versionId/versionTime handling are method-resolver mediated.
      update:
        also_known_as: >
          Optional correlation metadata only. For did:me, alsoKnownAs is
          non-authoritative and MUST NOT affect core validity or update
          authorization.
        projection_only_metadata: >
          hardwareBound, biometricProtected, userVerificationMethod, and
          deviceModel are DID Document projection metadata. They MUST NOT
          affect did:me core validity unless a future profile explicitly makes
          them authoritative.
    checks:
      resolve:
        - version_in_verified_chain
        - deactivation_not_conflated_with_absence
      validate:
        - structure
        - method_support
        - controller
        - verification_method
        - relationship_references
        - genesis_binding
        - rollback_regression
        - deactivation_not_conflated_with_absence
    subresources:
      controllers:
        commands: [add, remove, replace, validate_authority]
      verification_methods:
        commands: [add, get, list, update, remove, set_relationship]
      services:
        commands: [add, get, list, update, remove]
        request_fields:
          add:
            service_type:
              enum:
                - MessagingService
                - PaymentService
                - OpenID4VCI
                - OpenID4VP
                - EudiCredentialService
                - DidMeDirectoryService
          update:
            service_type:
              enum:
                - MessagingService
                - PaymentService
                - OpenID4VCI
                - OpenID4VP
                - EudiCredentialService
                - DidMeDirectoryService
      update_policy:
        commands: [get, update, validate]
        request_fields:
          update:
            - allowed_verification_methods
            - threshold
        checks:
          validate:
            - non_empty_for_active
            - threshold_bounds
            - references_resolve
        notes: >
          did:me updatePolicy is a genesis-committed control-plane object.
          Changes are ordinary core updates authorized under the previously
          active policy, not W3C capabilityDelegation semantics.
      updates:
        commands:
          - propose
          - attest
          - list_attestations
          - submit
          - cancel
        checks:
          submit:
            - id_unchanged
            - sequence_increment
            - prev_link
            - threshold_met
            - distinct_methods
            - controller_membership
            - signing_input_domain_tag
        notes: >
          did:me threshold updates may require attestations from different
          devices, backups, or custodians. The propose/attest/submit shape
          models k-of-n authorization without treating any one device as the
          sole updater.
      keys:
        commands:
          - generate
          - import
          - export_public
          - bind
          - list
          - get_status
          - revoke
          - destroy
          - rotate
          - rotate_relationship
          - replace_compromised
          - rotate_all
          - set_relationships
        request_fields:
          rotate:
            purpose: >
              Routine rekey for one or more explicit verification methods,
              including non-compromise cases such as messaging or key-agreement
              key refresh. This command is not a compromise recovery workflow.
            target:
              one_of:
                - verification_method_id
                - relationship
            relationship:
              enum:
                - authentication
                - assertion_method
                - key_agreement
                - capability_invocation
                - capability_delegation
                - controller
            retain_superseded_for: duration
          rotate_relationship:
            purpose: >
              Routine rekey for every verification method referenced by one DID
              verification relationship. For did:me v1, key_agreement covers
              messaging pre-key publication through MessagingService.preKeys,
              and capability_invocation covers update-policy authority keys.
            relationship:
              enum:
                - authentication
                - assertion_method
                - key_agreement
                - capability_invocation
                - capability_delegation
                - controller
            support_notes:
              - did:me v1 core/proto projects authentication, assertionMethod, keyAgreement, and capabilityInvocation.
              - capabilityDelegation is a DID Core relationship; a did:me v1 provider must fail closed unless a future method profile defines it.
          destroy:
            purpose: >
              Destroy superseded or compromised private material when ownership
              and API semantics permit it. did:me messaging pre-key private
              material must not outlive the configured retention window.
          set_relationships:
            purpose: >
              Assign an existing verification method to one or more typed DID
              verification relationships, including delegated operational keys
              where the DID method supports that relationship.
        notes: >
          rotate is the normal explicit-method rekey command. It can replace a
          single messaging/key-agreement key without claiming compromise.
          rotate_relationship rekeys every key in one DID relationship, such as
          all keyAgreement messaging keys. rotate_all rekeys all managed DID
          verification methods and relationship references according to provider
          policy. set_relationships is the typed delegate/authority assignment
          surface. replace_compromised is a distinct command because its
          semantics differ from rotation: revoke, supersede, and re-attest.
          Relationship enum values use snake_case DID Document relationship
          field names such as assertion_method; prose may still render the
          W3C JSON property as assertionMethod or assertion method.
      directory:
        commands: [publish, unpublish, get, fetch_core, list_transparency_log]
        notes: >
          did:me directory publication is opt-in convenience infrastructure.
          Signed core chains remain authoritative, and deactivation must remain
          distinguishable from absence.
      messaging_keys:
        commands:
          - designate_pre_keys
          - rotate_pre_keys
          - discover_pre_keys
        checks:
          discover_pre_keys:
            - pre_key_in_key_agreement
            - hybrid_set_present
            - snapshot_transcript_binding
        notes: >
          did:me MessagingService preKeys are controller-published
          keyAgreement references. Sender-side discovery must bind the selected
          pre-key snapshot to DID, sequence, and current core CID.
      domain_verifications:
        commands: [add, remove, list, verify]
        request_fields:
          add:
            method:
              enum: [dns_txt, https_wellknown]
        notes: >
          did:me domainVerification is non-authoritative document metadata.
          The verify command is the relying-party DNS TXT or HTTPS well-known
          check; DID validity does not follow from the claimed domain.
      methods:
        commands: [register, configure, list, validate_support, get_capabilities]
    notes:
      - did:me v1 does not define capabilityDelegation semantics. Generic DID relationship enums may carry capability_delegation for methods that support it, but did:me delegated control is expressed through updatePolicy.allowedVerificationMethods, threshold attestations, and currently active controller membership.
      - reactivate and migrate are capability-gated DID lifecycle commands. did:me v1 terminal deactivation is irreversible and method registrations must not advertise reactivate or migrate for did:me.
      - Query-based versionId/versionTime dereferencing delegates to the same version-resolution machinery as resolve, so dereference and resolve must not define divergent version semantics.


