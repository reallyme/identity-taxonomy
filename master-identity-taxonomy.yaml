  reference_framework: eudi_wallet_arf
  credential_profiles: [pid, qeaa, pub_eaa, eaa]
  trust_services:
    in_scope:
      - qualified_certificates_for_electronic_signatures
      - qualified_certificates_for_electronic_seals
      - qualified_electronic_timestamp_services
      - qualified_signature_creation_services
      - qualified_seal_creation_services
      - qualified_signature_validation_services
      - qualified_seal_validation_services
    out_of_scope_v2:
      # eIDAS 2.0 Article 45 services acknowledged but not modeled here.
      - qwac_website_authentication
      - electronic_registered_delivery
      - electronic_archiving
      - electronic_ledgers

surface_scope:
  sdk_local:
    description: Local package facade.
  hosted_service:
    description: Hosted issuer, verifier, wallet, trust, administration, and operations APIs.
  sibling_repo:
    description: Lower-level protocol, wallet, crypto, and identity-core crates.
  diagnostics:
    description: Conformance, testing, tracing, and developer-safety surfaces.

availability:
  surfaces:
    - rust
    - ffi
    - wasm
    - typescript_browser
    - typescript_node
    - swift
    - kotlin
    - jni
    - hosted_api

execution_targets:
  - local
  - platform_native
  - hosted_service
  - sibling_repo
  - external_provider
  - local_or_remote

taxonomy_invariants:
  - Every checks.<command> key must reference a command declared by that resource.
  - Every sdk_first_path entry must resolve to a declared command.
  - Every mechanism_for target must resolve to a declared resource or command.
  - Every view canonical_command target must resolve to a declared command.
  - Every completion_view canonical_command target must resolve to a declared command.
  - Every command_overrides key must reference a command declared by that resource.
  - Every owner value must exist in surface_scope.
  - Every boundaries, surfaces, and availability entry must exist in availability.surfaces.
  - Every sdk_command_registry capability reference must exist in capability_registry.
  - Every sdk_command_registry behavior value must use the documented SDK behavior vocabulary.
  - Every standards reference must exist in standards.
  - Every $ref type reference must exist in types.
  - Every request_fields group must reference a command or documented command family.
  - Every canonical_for value must have exactly one canonical owner.
  - No canonical command may be declared canonical by two resources.
  - Every declared command must have a unique generated operation identifier.
  - Every operation_registry entry must resolve to a declared command.
  - Every command stability value must be declared in modeling_rules.stability.
  - Every command deprecation replacement must resolve to a command or operation_id.
  - Every command capability reference must resolve to a Capability identifier.
  - Every feature flag must use an allowed enabled value.
  - Every standard and credential format support value must be required, optional, or compatibility.
  - Every operation event must exist in common_event_types.
  - Every operation OAuth scope must exist in oauth_scopes.
  - Every operation name map must keep canonical equal to operation_id.
  - Every operation interop standard and profile must be declared.
  - Every operation security, behavior, visibility, and operation_type value must be valid.
  - Every sdk_first_path entry must have an sdk_command_registry entry before it is treated as package-visible.
  - Every sdk_command_registry entry must declare dto_backing.
  - Every sdk_command_registry type reference must resolve to types: or sdk_dto_registry according to dto_backing/package DTO metadata.
  - Every sdk_command_registry canonical_type must resolve to a shared type in types:.
  - Inputs requiring unavailable capabilities must fail closed with IdentityError.category unsupported_capability.
  - proto_package is only a namespace hint; proto-backed and wallet-core RPC commands must declare exact proto_messages.

operation_identity:
  namespace: identity
  default_operation_id_template: identity.<resource_path>.<command>
  stability_rule: >
    Published operation identifiers are permanent and must not change when YAML
    sections are reorganized, command groups are renamed, or language bindings
    are regenerated.
  explicit_registry_required_for:
    - sdk_first_path
    - sdk_command_registry
    - generated_boundaries

