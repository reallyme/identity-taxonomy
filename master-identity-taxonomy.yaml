        commands: [request, issue, validate, renew, revoke, get_status]
        checks:
          validate: [registered_attributes, entitlement, issuer_authorization, validity]
      credentials:
        # One lifecycle for the four European credential categories. The
        # category field selects issuer-authorization and trust rules; the
