taxonomy_guidance:
  rule: >
    This file is a master taxonomy, not a promise that every command becomes a
    public method on the local Identity package. The public package exposes a
    small, obvious facade for common identity flows, while hosted services,
    sibling protocol crates, administration APIs, and diagnostics own the
    remaining specialized commands.
  # Every entry below resolves to a command defined in this file.
  sdk_first_path:
    - dids.create
    - dids.resolve
    - dids.parse
    - dids.dereference
    - dids.validate
    - dids.update
    - dids.keys.rotate
    - dids.keys.rotate_relationship
    - dids.keys.replace_compromised
    - dids.keys.rotate_all
    - dids.keys.set_relationships
    - dids.deactivate
    - issuance.issue
    - credential_requests.request
    - credentials.validate
    - credential_state.check_status
    - presentations.request
    - presentations.present
    - presentations.verify
    - wallets.open
    - wallets.credentials.store
    - wallets.credentials.list
    - trust.evaluate
    - trust.lists.ingest
    - status_resolution.check
  hosted_first_path:
    - tenants
    - organisations
    - subjects
    - issuers
    - verifiers
    - wallet_providers
    - wallet_registrations
    - api_keys
    - billing
    - webhooks
    - jobs
    - batches
  sibling_first_path:
    - openid4vci
    - openid4vp
    - dcql
    - sd_jwt
    - mdoc
    - zero_knowledge
    - crypto
    - hsm
    - secure_element

