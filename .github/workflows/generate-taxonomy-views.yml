name: generate taxonomy views

on:
  push:
    branches:
      - main
    paths:
      - master-identity-taxonomy.yaml
      - scripts/generate_taxonomy_views.rb
      - .github/workflows/generate-taxonomy-views.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    env:
      LANG: C
      LC_ALL: C
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Generate taxonomy views
        run: ruby scripts/generate_taxonomy_views.rb
      - name: Commit generated views
        run: |
          if git diff --quiet -- taxonomy-views; then
            echo "taxonomy views are up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add taxonomy-views
          git commit -m "Update generated taxonomy views"
          git push
